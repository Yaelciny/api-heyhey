server.servlet.context-path=/system/api/v1
spring.application.name=heyhey-backend
server.port = 8081

#credenciales de mi base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_heyhey_tareas?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#configuracion de Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect